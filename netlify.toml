[build]
  command = "npm run build"
  publish = "dist"

# Long-cache immutable assets (hashed filenames) and the big game bundles.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jsdos"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/games/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
