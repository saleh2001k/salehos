<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOS</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #dos {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="dos"></div>
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <script>
      // Bundles are self-hosted: cdn.dos.zone blocks cross-origin fetches.
      var allowed = ["doom", "prince", "crystal-caves", "lemmings"];
      var bundle = new URLSearchParams(location.search).get("bundle") || "doom";
      if (allowed.indexOf(bundle) === -1) bundle = "doom";
      Dos(document.getElementById("dos"), {
        url: "/" + bundle + ".jsdos",
        autoStart: true,
        kiosk: true,
        noCloud: true,
      });
    </script>
  </body>
</html>
